<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SENAAT: On Air — Video Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-primary:   #0047BB;
    --blue-dark:      #001E62;
    --blue-mid:       #202A45;
    --blue-steel:     #315473;
    --blue-light:     #0089D8;
    --blue-slate:     #869CB5;
    --cyan:           #00C4E9;
    --red:            #EC3400;
    --gold:           #FFB500;
    --navy-bg:        #0a1020;
    --navy-card:      #0d1528;
    --navy-surface:   #111b30;
    --border:         rgba(0,71,187,0.25);
    --border-light:   rgba(0,71,187,0.12);
    --text:           #ffffff;
    --text-muted:     rgba(255,255,255,0.5);
    --text-faint:     rgba(255,255,255,0.25);
    --font:           'Alexandria', 'Tahoma', sans-serif;
  }

  html, body {
    background: var(--navy-bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HERO ── */
  .hero {
    background: var(--blue-primary);
    position: relative;
    overflow: hidden;
    padding: 3rem 2.5rem 2.5rem;
  }

  /* Geometric shapes from brand pattern */
  .hero-geo {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .geo-rect-1 {
    position: absolute;
    top: -60px; right: -40px;
    width: 260px; height: 260px;
    background: var(--blue-dark);
    opacity: 0.45;
    transform: rotate(18deg);
    border-radius: 16px;
  }
  .geo-rect-2 {
    position: absolute;
    top: 30px; right: 160px;
    width: 120px; height: 120px;
    background: var(--blue-dark);
    opacity: 0.25;
    transform: rotate(18deg);
    border-radius: 10px;
  }
  .geo-rect-3 {
    position: absolute;
    bottom: -50px; right: 60px;
    width: 160px; height: 160px;
    border: 18px solid rgba(0,196,233,0.15);
    border-radius: 50%;
  }
  .geo-line-1 {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan) 0%, var(--blue-primary) 40%, transparent 100%);
    opacity: 0.6;
  }
  .geo-stripe {
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 6px;
    background: var(--cyan);
    opacity: 0.4;
  }

  .hero-content { position: relative; z-index: 1; }

  .live-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 3px;
    margin-bottom: 1.1rem;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyan);
    animation: blink 1.4s infinite;
    box-shadow: 0 0 6px var(--cyan);
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .hero-title {
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 700;
    line-height: 1.08;
    margin-bottom: 0.55rem;
    letter-spacing: -0.01em;
  }
  .hero-title .accent { color: var(--gold); }
  .hero-sub {
    font-size: 13.5px; color: rgba(255,255,255,0.65);
    font-weight: 300; letter-spacing: 0.02em;
    max-width: 480px;
  }

  /* brand stripe below hero */
  .brand-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--cyan) 0%, var(--blue-primary) 45%, var(--blue-dark) 100%);
  }

  /* ── CONTROLS ── */
  .controls-wrap { background: var(--navy-bg); border-bottom: 1px solid var(--border-light); }

  .lang-bar {
    padding: 0.8rem 2.5rem;
    display: flex; gap: 7px; align-items: center;
    border-bottom: 1px solid var(--border-light);
    flex-wrap: wrap;
  }
  .lang-label { font-size: 10.5px; color: var(--text-faint); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

  .filter-bar {
    padding: 0.9rem 2.5rem;
    display: flex; gap: 7px; flex-wrap: wrap; align-items: center;
  }

  button { font-family: var(--font); cursor: pointer; transition: all 0.16s; border: none; outline: none; }

  .lang-btn {
    font-size: 11.5px; font-weight: 500;
    padding: 5px 14px; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: var(--text-muted);
  }
  .lang-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .lang-btn.active-all  { background: rgba(0,71,187,0.25); border-color: var(--blue-primary); color: var(--cyan); }
  .lang-btn.active-en   { background: rgba(0,71,187,0.2); border-color: var(--blue-light); color: #aed6f1; }
  .lang-btn.active-ar   { background: rgba(0,196,233,0.1); border-color: var(--cyan); color: var(--cyan); }

  .tag {
    font-size: 11.5px; font-weight: 400;
    padding: 5px 14px; border-radius: 3px;
    border: 1px solid rgba(0,71,187,0.35);
    background: transparent; color: var(--blue-slate);
  }
  .tag:hover { border-color: var(--blue-primary); color: var(--text); }
  .tag.active { background: var(--blue-primary); border-color: var(--blue-primary); color: #fff; }

  .count-label { margin-left: auto; font-size: 11.5px; color: var(--text-faint); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border-light);
  }

  .card {
    background: var(--navy-card);
    cursor: pointer;
    transition: background 0.15s;
    display: flex; flex-direction: column;
    text-decoration: none;
    border-left: 3px solid transparent;
  }
  .card:hover {
    background: var(--navy-surface);
    border-left-color: var(--blue-primary);
  }

  .thumb {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #080f1e;
    overflow: hidden;
  }
  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.3s;
  }
  .card:hover .thumb img { transform: scale(1.04); }

  .thumb-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,10,30,0.45);
    transition: background 0.2s;
  }
  .card:hover .thumb-overlay { background: rgba(0,10,30,0.2); }

  .play-btn {
    width: 44px; height: 44px;
    border-radius: 4px;
    background: rgba(0,71,187,0.85);
    border: 1px solid var(--blue-light);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s;
    backdrop-filter: blur(4px);
  }
  .card:hover .play-btn {
    transform: scale(1.1);
    background: var(--blue-primary);
  }
  .play-arrow {
    width: 0; height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 12px solid #fff;
    margin-left: 3px;
  }

  /* top-left accent line on thumb */
  .thumb::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: var(--blue-primary);
    opacity: 0.7;
  }

  .corner-badges {
    position: absolute; top: 10px; left: 10px;
    display: flex; gap: 4px;
  }
  .badge {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 2px;
  }
  .badge.senaat { background: var(--blue-primary); color: #fff; }
  .badge.zamil  { background: var(--blue-steel);   color: #fff; }
  .badge.ar     { background: rgba(0,196,233,0.15); color: var(--cyan); border: 1px solid rgba(0,196,233,0.3); }
  .badge.en     { background: rgba(255,181,0,0.12); color: var(--gold); border: 1px solid rgba(255,181,0,0.25); }

  /* new badge */
  .badge.new-vid { background: var(--red); color: #fff; }

  .card-body {
    padding: 0.8rem 0.9rem 0.9rem 0.9rem;
    flex: 1; display: flex; flex-direction: column; gap: 5px;
    border-left: none; /* handled by card */
  }
  .card-title {
    font-size: 13px; font-weight: 500;
    line-height: 1.45; color: rgba(255,255,255,0.88);
  }
  .card-title.rtl { direction: rtl; text-align: right; font-family: 'Segoe UI', Tahoma, 'Alexandria', sans-serif; }
  .card-meta {
    font-size: 11px; color: var(--text-faint);
    display: flex; gap: 6px; margin-top: auto; flex-wrap: wrap;
  }
  .card-meta.rtl { direction: rtl; justify-content: flex-end; }

  .empty {
    padding: 4rem 2.5rem;
    text-align: center; color: var(--text-muted); font-size: 14px;
    grid-column: 1 / -1;
  }

  /* ── FOOTER ── */
  .footer {
    background: var(--blue-primary);
    padding: 1.4rem 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    position: relative; overflow: hidden;
  }
  .footer::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), var(--blue-primary));
  }
  .footer-brand {
    font-size: 15px; font-weight: 700; color: #fff;
    letter-spacing: 0.04em;
  }
  .footer-brand span { color: var(--gold); }
  .footer-link {
    font-size: 12px; color: rgba(255,255,255,0.75);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 6px 16px; border-radius: 3px;
    transition: all 0.15s; font-family: var(--font);
  }
  .footer-link:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .hero, .lang-bar, .filter-bar, .footer { padding-left: 1.25rem; padding-right: 1.25rem; }
    .count-label { display: none; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-geo">
    <div class="geo-rect-1"></div>
    <div class="geo-rect-2"></div>
    <div class="geo-rect-3"></div>
    <div class="geo-stripe"></div>
    <div class="geo-line-1"></div>
  </div>
  <div class="hero-content">
    <div class="live-badge"><span class="live-dot"></span> Video Hub</div>
    <h1 class="hero-title">SENAAT<span class="accent">:</span> On Air</h1>
    <p class="hero-sub">Every video. Every story. From Zamil Industrial to Senaat — in Arabic &amp; English.</p>
  </div>
</div>
<div class="brand-bar"></div>

<!-- CONTROLS -->
<div class="controls-wrap">
  <div class="lang-bar">
    <span class="lang-label">Language:</span>
    <button class="lang-btn active-all" data-lang="all">All</button>
    <button class="lang-btn" data-lang="en">English</button>
    <button class="lang-btn" data-lang="ar">عربي</button>
  </div>
  <div class="filter-bar">
    <button class="tag active" data-filter="all">All</button>
    <button class="tag" data-filter="senaat">Senaat</button>
    <button class="tag" data-filter="zamil">Zamil Industrial</button>
    <button class="tag" data-filter="news">News &amp; Media</button>
    <button class="tag" data-filter="projects">Projects &amp; Awards</button>
    <span class="count-label" id="count"></span>
  </div>
</div>

<!-- VIDEO GRID -->
<div class="grid" id="grid"></div>

<!-- FOOTER -->
<div class="footer">
  <span class="footer-brand">SENAAT<span>: On Air</span></span>
  <a class="footer-link" href="https://www.youtube.com/@SenaatCompany" target="_blank" rel="noopener">
    Visit Official Channel →
  </a>
</div>

<script>
  var videos = [

    /* ══ NEW — from Corporate Communications emails ══ */
    { id:null,           url:"https://bit.ly/Alekhbariya-2025",  title:"Hamad Al Zamil on Al Ekhbariya | SENAAT 2025 Annual Results",                              channel:"Corporate Communications",  date:"Apr 2026",    category:"news",     brand:"senaat", lang:"en", isNew:true },
    { id:null,           url:"https://bit.ly/AlArabiya-2025",    title:"Al Arabiya Business Interview | SENAAT 2025 Annual Performance with Hamad Al Zamil",       channel:"Corporate Communications",  date:"Apr 2026",    category:"news",     brand:"senaat", lang:"en", isNew:true },
    { id:null,           url:"https://bit.ly/CEO-Asharq_2025",   title:"CEO Interview on Bloomberg Asharq | SENAAT 2025 Annual Results",                           channel:"Corporate Communications",  date:"Apr 2026",    category:"news",     brand:"senaat", lang:"en", isNew:true },
    { id:null,           url:"https://bit.ly/CEO-CNBC-2025",     title:"CEO Interview on CNBC Arabia | SENAAT 2025 Annual Results",                                 channel:"Corporate Communications",  date:"Apr 2026",    category:"news",     brand:"senaat", lang:"en", isNew:true },
    { id:"YP8v3EEPxjE",  url:null,                               title:"CEO Interview with Asharq Business | SENAAT Q3-2025 Financial Performance",                 channel:"Asharq Business",           date:"Nov 2025",    category:"news",     brand:"senaat", lang:"en", isNew:true },
    { id:"2ZpA-zFBy9M",  url:null,                               title:"Hamad Al Zamil on Al Ekhbariya | SENAAT Q3-2025 Financial Performance",                     channel:"Al Ekhbariya",              date:"Nov 2025",    category:"news",     brand:"senaat", lang:"en", isNew:true },
    { id:"cpraStAvnOg",  url:null,                               title:"CEO Interview with CNBC Arabia | SENAAT Q3-2025 Financial Performance",                     channel:"CNBC Arabia",               date:"Nov 2025",    category:"news",     brand:"senaat", lang:"en", isNew:true },
    { id:"X0Q0EQj-y9c",  url:null,                               title:"SENAAT Chairman Abdulla Al Zamil on Asharq Bloomberg | Launching the New Brand Identity",   channel:"Asharq Bloomberg",          date:"Oct 2025",    category:"senaat",   brand:"senaat", lang:"en", isNew:true },
    { id:"utZpO7f8atg",  url:null,                               title:"SENAAT Chairman Abdulla Al Zamil on CNBC Arabia | Rebranding to SENAAT",                    channel:"CNBC Arabia",               date:"Oct 2025",    category:"senaat",   brand:"senaat", lang:"en", isNew:true },

    /* ══ English — original ══ */
    { id:"FyA38WVlVBE",  url:null, title:"Zamil Industrial is Now SENAAT — A New Era Begins",                            channel:"SENAAT Company",      date:"Oct 2025",    category:"senaat",   brand:"senaat", lang:"en", isNew:false },
    { id:"2mDYDUVjlzc",  url:null, title:"The Official Reveal of SENAAT (formerly Zamil Industrial)",                    channel:"SENAAT Company",      date:"2025",        category:"senaat",   brand:"senaat", lang:"en", isNew:false },
    { id:"7fRuHa449qw",  url:null, title:"SENAAT Chairman Abdulla Al Zamil on Al Arabiya — Rebranding Story",            channel:"Al Arabiya",          date:"Oct 2025",    category:"news",     brand:"senaat", lang:"en", isNew:false },
    { id:"xk385lZbWBw",  url:null, title:"AlArabiya Interviews Hamad Al Zamil — SENAAT's Vision",                       channel:"Al Arabiya",          date:"2025",        category:"news",     brand:"senaat", lang:"en", isNew:false },
    { id:"5BKsb7QopMw",  url:null, title:"Zamil Industrial Investment Company — Full Corporate Video",                   channel:"Zamil Industrial",    date:"2021",        category:"zamil",    brand:"zamil",  lang:"en", isNew:false },
    { id:"0G-a4LnN3-I",  url:null, title:"Reshaping Heavy Industry Through IT-Driven Transformation",                    channel:"Zamil Industrial",    date:"Mar 2025",    category:"zamil",    brand:"zamil",  lang:"en", isNew:false },
    { id:"oWDBuK4drKc",  url:null, title:"Zamil Steel Wins the MODON Industrial Excellence Award",                       channel:"Zamil Steel",         date:"Dec 2025",    category:"projects", brand:"zamil",  lang:"en", isNew:false },
    { id:"FbtPZ-f-jjY",  url:null, title:"Zamil Industrial CEO at EFG Hermes Investors Conference",                      channel:"Asharq Business",     date:"Apr 2025",    category:"news",     brand:"zamil",  lang:"en", isNew:false },

    /* ══ Arabic — original ══ */
    { id:"9amsGTe_D9I",  url:null, title:"شركة الزامل للاستثمار الصناعي — الفيديو الكامل",                              channel:"الزامل للصناعة",      date:"2021",        category:"zamil",    brand:"zamil",  lang:"ar", isNew:false },
    { id:"-fx8yqTU8-4",  url:null, title:"الرئيس التنفيذي للزامل للصناعة: تضاعف الدخل الصافي إلى 3 مرات",              channel:"CNBC Arabia",         date:"مايو 2025",   category:"news",     brand:"zamil",  lang:"ar", isNew:false },
    { id:"FBlbD9URRxA",  url:null, title:"الرئيس التنفيذي للزامل: قطاع الحديد مثّل 50% من الأرباح",                    channel:"CNBC Arabia",         date:"أغسطس 2025",  category:"news",     brand:"zamil",  lang:"ar", isNew:false },
    { id:"TF7wHp7d20Q",  url:null, title:"الرئيس التنفيذي أحمد الزعتري يستعرض نتائج الربع الثاني 2025",                channel:"اقتصاد الشرق",        date:"أغسطس 2025",  category:"news",     brand:"zamil",  lang:"ar", isNew:false },
    { id:"XfkdP9CzUls",  url:null, title:"سهم صناعات — متابعة أداء شركة صناعات البناء المتقدمة",                       channel:"الأسواق المالية",     date:"أكتوبر 2025", category:"senaat",   brand:"senaat", lang:"ar", isNew:false },
    { id:"4zDYdSgJgHk",  url:null, title:"حمد الزامل يستعرض الأداء المالي للربع الثاني 2025 — الإخبارية",              channel:"قناة الإخبارية",      date:"أغسطس 2025",  category:"news",     brand:"zamil",  lang:"ar", isNew:false },
    { id:"5BQS7aqRDh8",  url:null, title:"Zamil Industrial — مدير الاتصالات في معرض Jeddah Construct 2024",             channel:"Big 5 Construct",     date:"أبريل 2024",  category:"projects", brand:"zamil",  lang:"ar", isNew:false },
    { id:"IguT0bEsPgE",  url:null, title:"الحلقة الخامسة: شركة الزامل للصناعة",                                        channel:"برامج اقتصادية",      date:"2023",        category:"zamil",    brand:"zamil",  lang:"ar", isNew:false }
  ];

  var activeLang   = "all";
  var activeFilter = "all";

  function render() {
    var grid = document.getElementById("grid");
    var filtered = videos.filter(function(v) {
      var langOk   = (activeLang   === "all") || (v.lang     === activeLang);
      var filterOk = (activeFilter === "all") || (v.category === activeFilter);
      return langOk && filterOk;
    });

    document.getElementById("count").textContent =
      filtered.length + " video" + (filtered.length !== 1 ? "s" : "");

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty">No videos match this filter.</div>';
      return;
    }

    grid.innerHTML = filtered.map(function(v) {
      var isAr = v.lang === "ar";
      var link = v.id
        ? "https://www.youtube.com/watch?v=" + v.id
        : v.url;

      var thumbHtml = v.id
        ? '<img src="https://img.youtube.com/vi/' + v.id + '/mqdefault.jpg" alt="' + v.title + '" loading="lazy" onerror="this.style.display=\'none\'" />'
        : '';

      var newBadge = v.isNew
        ? '<span class="badge new-vid">New</span>'
        : '';

      return [
        '<a class="card" href="' + link + '" target="_blank" rel="noopener">',
          '<div class="thumb">',
            thumbHtml,
            '<div class="thumb-overlay">',
              '<div class="play-btn"><div class="play-arrow"></div></div>',
            '</div>',
            '<div class="corner-badges">',
              '<span class="badge ' + v.brand + '">' + (v.brand === "senaat" ? "Senaat" : "Zamil") + '</span>',
              '<span class="badge ' + v.lang + '">' + (isAr ? "عربي" : "EN") + '</span>',
              newBadge,
            '</div>',
          '</div>',
          '<div class="card-body">',
            '<div class="card-title' + (isAr ? " rtl" : "") + '">' + v.title + '</div>',
            '<div class="card-meta' + (isAr ? " rtl" : "") + '">',
              '<span>' + v.channel + '</span>',
              '<span>·</span>',
              '<span>' + v.date + '</span>',
            '</div>',
          '</div>',
        '</a>'
      ].join("");
    }).join("");
  }

  /* Language filter */
  document.querySelectorAll(".lang-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".lang-btn").forEach(function(b) { b.className = "lang-btn"; });
      var lang = btn.getAttribute("data-lang");
      activeLang = lang;
      btn.classList.add(lang === "all" ? "active-all" : lang === "en" ? "active-en" : "active-ar");
      render();
    });
  });

  /* Category filter */
  document.querySelectorAll(".tag").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".tag").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      activeFilter = btn.getAttribute("data-filter");
      render();
    });
  });

  render();
</script>
</body>
</html>
